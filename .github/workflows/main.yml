name: Node Status Monitor

on:
  schedule:
    # Every 5 minutes. GitHub Actions cron can lag under load; treat this
    # as "at least every ~5-10 min", not a hard real-time guarantee.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

# Avoid overlapping runs stepping on the same state/history files.
concurrency:
  group: node-status-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run status check
        run: node check-status.js

      - name: Commit updated state and history
        run: |
          git config user.name "status-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/last-status.json history.log
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update node status state [skip ci]"
            git push
          fi
